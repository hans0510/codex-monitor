<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Codex Token Monitor</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="companion-shell" aria-live="polite">
      <section class="stats-panel" id="statsPanel">
        <header class="panel-head">
          <div class="drag-handle" id="dragHandle">
            <p class="eyebrow">Codex Token</p>
            <h1>噜噜记录中</h1>
          </div>
          <div class="window-actions">
            <span class="live-pill"><i></i>Live</span>
          </div>
        </header>

        <div class="total-strip">
          <span>All</span>
          <strong id="allTotal">0</strong>
        </div>

        <div class="range-grid" id="rangeGrid"></div>

        <div class="quota-grid" aria-label="Codex 额度">
          <div class="quota-item">
            <span>5 小时额度</span>
            <strong id="fiveHourRemaining">剩余 --</strong>
            <small id="fiveHourReset">暂无额度数据</small>
          </div>
          <div class="quota-item">
            <span>周额度</span>
            <strong id="weeklyRemaining">剩余 --</strong>
            <small id="weeklyReset">暂无额度数据</small>
          </div>
        </div>

        <div class="field-grid">
          <div><span>Input</span><strong id="inputTotal">0</strong></div>
          <div><span>Cached</span><strong id="cachedTotal">0</strong></div>
          <div><span>Output</span><strong id="outputTotal">0</strong></div>
          <div><span>Reasoning</span><strong id="reasoningTotal">0</strong></div>
        </div>

        <label class="size-control">
          <span>大小</span>
          <input id="luluSize" type="range" min="47.5" max="340" step="2.5" />
          <strong id="luluSizeValue">100%</strong>
        </label>

        <p class="status-line" id="statusLine">启动中...</p>
        <p class="home-line" id="homeLine"></p>
      </section>

      <button
        class="lulu"
        id="capybara"
        type="button"
        aria-label="拖动噜噜，点击打开或隐藏 token 统计"
      >
        <img src="./lulu-cutout.png" alt="噜噜" draggable="false" />
      </button>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
